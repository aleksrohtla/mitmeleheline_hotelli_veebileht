<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="css/style.css">
    <title>Hotell | Kontakt</title>
</head>
<body>

    <header>
        <nav id="navbar">
            <div>
                <h1><a href="index.html">VOCO</a></h1>
                <ul>
                    <li><a href="index.html">Avaleht</a></li>
                    <li><a href="about.html">Kirjeldus</a></li>
                    <li><a href="contact.html" class="active">Kontakt</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <section id="info-content" style="max-width: 800px; margin: 40px auto; border-radius: 5px;">
        <h2>Võta <span style="color: #e8a020;">Ühendust</span> Meiega</h2>
        <p>Palun täida all olev vorm</p>
        <form action="#">
            <div style="margin-bottom: 15px;">
                <label for="nimi" style="display:block; margin-bottom: 5px; color: #444;">Nimi</label>
                <input type="text" id="nimi" style="width: 100%; padding: 10px; border: 1px solid #ccc;">
            </div>
            <div style="margin-bottom: 15px;">
                <label for="email" style="display:block; margin-bottom: 5px; color: #444;">Email</label>
                <input type="email" id="email" style="width: 100%; padding: 10px; border: 1px solid #ccc;">
            </div>
            <div style="margin-bottom: 15px;">
                <label for="sonum" style="display:block; margin-bottom: 5px; color: #444;">Sõnum</label>
                <textarea id="sonum" rows="6" style="width: 100%; padding: 10px; border: 1px solid #ccc;"></textarea>
            </div>
            <button type="submit" class="btn" style="background: #333; color: #fff; cursor: pointer;">Saada</button>
        </form>
    </section>

    <section id="home-boxes">
        <div class="box">
            <i class="icon">🏠</i>
            <h3>Aadress</h3>
            <p>Kopli 1A, Tartu</p>
        </div>
        <div class="box highlight">
            <i class="icon">📞</i>
            <h3>Telefon</h3>
            <p>5555 5555</p>
        </div>
        <div class="box">
            <i class="icon">✉️</i>
            <h3>Email</h3>
            <p>info@voco.ee</p>
        </div>
    </section>

    <footer>
        <p>VOCO &copy;2019, Kõik Õigused On Kaitstud</p>
    </footer>

</body>
</html>
